# Horizon — Postgres 15, Redis, migrations Alembic, API FastAPI

services:
  db:
    image: postgres:15-alpine
    container_name: horizon_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: horizon_db
      POSTGRES_USER: horizon_user
      POSTGRES_PASSWORD: horizon_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U horizon_user -d horizon_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: horizon_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build: .
    container_name: horizon_migrations
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg2://horizon_user:horizon_pass@db:5432/horizon_db
    command: >
      sh -c "alembic upgrade head && echo 'Migrations OK'"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./horizon:/app/horizon
      - ./alembic.ini:/app/alembic.ini
    restart: "no"

  seed:
    build: .
    container_name: horizon_seed
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg2://horizon_user:horizon_pass@db:5432/horizon_db
    command: >
      sh -c "python scripts/seed.py && echo 'Seed OK'"
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./horizon:/app/horizon
      - ./scripts:/app/scripts
      - ./alembic.ini:/app/alembic.ini
    profiles:
      - seed
    restart: "no"

  api:
    build: .
    container_name: horizon_api
    restart: unless-stopped
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg2://horizon_user:horizon_pass@db:5432/horizon_db
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      # Variables Proxmox lues depuis le fichier .env local
      PROXMOX_ENABLED: ${PROXMOX_ENABLED:-false}
      PROXMOX_HOST: ${PROXMOX_HOST:-}
      PROXMOX_USER: ${PROXMOX_USER:-root@pam}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-horizon}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET:-}
      PROXMOX_VERIFY_SSL: ${PROXMOX_VERIFY_SSL:-false}
      PROXMOX_DEFAULT_NODE: ${PROXMOX_DEFAULT_NODE:-pve}
      PROXMOX_NET0_TEMPLATE: ${PROXMOX_NET0_TEMPLATE:-virtio,bridge=vmbr0}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-changeme}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme}
    ports:
      - "8000:8000"
    volumes:
      - ./horizon:/app/horizon
      - ./scripts:/app/scripts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: horizon_network
